# Default Profile: Production (AWS)
# For local development, use: mvn spring-boot:run -Dspring-boot.run.profiles=local

# Server Configuration
server.port=8080

# MySQL Database Configuration (Production - AWS RDS)
spring.datasource.url=jdbc:mysql://${RDS_ENDPOINT:localhost}:3306/taskdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:Admin123!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
