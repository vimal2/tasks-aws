# Local Development Profile
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=local

# Server Configuration
server.port=8080

# H2 In-Memory Database Configuration
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Local File Storage Configuration
# Use ${user.dir} for cross-platform compatibility (resolves to current working directory)
file.storage.location=${user.dir}/uploads
file.storage.type=local

# File upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging for debugging file uploads
logging.level.com.example.taskapi.service.FileStorageService=DEBUG
logging.level.com.example.taskapi.controller.FileController=DEBUG
